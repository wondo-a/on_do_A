<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이폰 스타일 파일 목록</title>
    <style>
        /* 기본 스타일 및 리셋 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background-color: #f2f2f7; /* iOS 배경색 */
            margin: 0;
            padding: 20px 0; /* 목록 위아래 여백 */
        }

        /* 목록 컨테이너 스타일 */
        .list-container {
            background-color: #ffffff; /* 목록 배경색 */
            list-style: none;
            padding: 0;
            margin: 0 15px; /* 좌우 여백 */
            border-radius: 10px; /* 모서리 둥글게 */
            overflow: hidden; /* 경계선 처리를 위해 */
            box-shadow: 0 0.5px 0 0 rgba(0, 0, 0, 0.05); /* 부드러운 그림자 효과 */
        }

        /* 목록 항목 스타일 */
        .list-item {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000000;
            text-decoration: none;
            position: relative;
        }

        /* 항목 구분선 */
        .list-item:not(:last-child)::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 15px; /* 텍스트 시작 위치와 맞추기 */
            right: 0;
            height: 0.5px;
            background-color: #c6c6c8; /* 얇은 구분선 색상 */
        }

        /* 항목 텍스트 스타일 */
        .item-text {
            font-size: 15px;
        }

        /* 오른쪽 화살표 아이콘 */
        .arrow-icon {
            color: #8e8e93; /* 아이콘 색상 */
            font-size: 18px;
            margin-left: 10px;
        }

        /* 항목을 클릭/탭했을 때의 피드백 (선택적) */
        .list-item:active {
            background-color: #e5e5ea;
        }

        /* 파일 아이콘 (예시) */
        .file-icon {
            margin-right: 10px;
            font-size: 20px;
        }

        .app-header h4 {
            margin: 0;
            font-size: 24px; /* 큰 제목 크기 */
            font-weight: 700;
            color: black;
        }
    </style>
</head>
<body>
    <header class="app-header"> 
            <h4 style="text-align: left; margin-left: 20px; margin-bottom: 10px;">둘러보기</h4>
    </header>

    <ul class="list-container">
        <a href="#" class="list-item">
            <div style="display: flex; align-items: center;">
                <span class="file-icon">⬇️</span>
                <span class="item-text">다운로드</span>
            </div>
            <span class="arrow-icon">></span>
        </a>

        <a href="#" class="list-item">
            <div style="display: flex; align-items: center;">
                <span class="file-icon">📱</span>
                <span class="item-text">나의 iPhone</span>
            </div>
            <span class="arrow-icon">></span>
        </a>

        <a href="#" class="list-item">
            <div style="display: flex; align-items: center;">
                <span class="file-icon">☁️</span>
                <span class="item-text">iCloud Drive</span>
            </div>
            <span class="arrow-icon">></span>
        </a>

        <a href="#" class="list-item">
            <div style="display: flex; align-items: center;">
                <span class="file-icon">📄</span>
                <span class="item-text">에테르 코어.pdf</span>
            </div>
            <span class="arrow-icon">></span>
        </a>

        <a href="#" class="list-item">
            <div style="display: flex; align-items: center;">
                <span class="file-icon">🖼️</span>
                <span class="item-text">2026_cctv.jpg</span>
            </div>
            <span class="arrow-icon">></span>
        </a>

        <a href="#" class="list-item">
            <div style="display: flex; align-items: center;">
                <span class="file-icon">📦</span>
                <span class="item-text">백업_파일.zip</span>
            </div>
            <span class="arrow-icon">></span>
        </a>
    </ul>
</body>
</html>
