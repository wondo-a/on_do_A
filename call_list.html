<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전화</title>
    <style>
        /* 📌 [CSS 시작] - 전체적인 레이아웃 및 스타일 (메시지 목록과 유사) */
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        /* 1. 상단 메뉴바 */
        .header {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            background-color: #ffffff;
            z-index: 10;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            color: #007aff; /* iOS 스타일 파란색 */
            margin-bottom: 5px;
        }

        .header-title {
            font-size: 32px;
            font-weight: bold;
        }

        /* 2. 전화 목록 컨테이너 (스크롤 영역) */
        .call-container {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 0 10px 0;
        }

        /* 3. 개별 통화 항목 스타일 */
        .call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .call-item:active {
            background-color: #f5f5f5;
        }

        .call-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        
        /* 4. 이름 및 전화 정보 */
        .name {
            font-size: 17px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .details {
            font-size: 13px;
            color: #888888;
            display: flex;
            align-items: center;
            margin-top: 2px;
        }

        /* 통화 타입 아이콘 (발신, 수신, 부재중) */
        .call-type-icon {
            margin-right: 5px;
            font-size: 10px;
            line-height: 1;
        }
        
        /* 부재중 전화 강조 */
        .missed .name, .missed .details {
            color: #ff3b30; /* 빨간색 */
        }
        .missed .call-type-icon {
             color: #ff3b30;
        }


        /* 5. 시간/날짜 및 정보 버튼 */
        .call-action {
            display: flex;
            align-items: center;
            color: #888888;
            flex-shrink: 0;
        }

        .time {
            font-size: 15px;
            margin-right: 15px;
        }

        .info-icon {
            font-size: 20px;
            color: #007aff;
        }

        /* 📌 [CSS 끝] */
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top-row">
            <span>편집</span>
            <div>
                <span style="margin-right: 15px;">🔍</span>
                <span>➕</span>
            </div>
        </div>
        <div class="header-title">
            최근 통화
        </div>
    </div>

    <div class="call-container">

        <div class="call-item">
            <div class="call-info">
                <span class="name">진운</span>
                <div class="details">
                    <span class="call-type-icon">↗</span> <span>통화 종료</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">07/03</span>
                <span class="info-icon">&gt;</span>
            </div>
        </div>
        
        <div class="call-item missed">
            <div class="call-info">
                <span class="name">도아린</span>
                <div class="details">
                    <span class="call-type-icon">↩</span> <span>부재중 통화</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">07/02</span>
                <span class="info-icon">&gt;</span> </div>
        </div>
        
        <div class="call-item">
            <div class="call-info">
                <span class="name">진운</span>
                <div class="details">
                    <span class="call-type-icon">↙</span>
                    <span>통화 종료</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">07/01</span>
                <span class="info-icon">&gt;</span>
            </div>
        </div>

        <div class="call-item missed">
            <div class="call-info">
                <span class="name">조희음</span>
                <div class="details">
                    <span class="call-type-icon">↩</span>
                    <span>부재중 통화</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">06/30</span>
                <span class="info-icon">&gt;</span>
            </div>
        </div>

        <div class="call-item">
            <div class="call-info">
                <span class="name">장선영</span>
                <div class="details">
                    <span class="call-type-icon">↩</span>
                    <span>통화 종료</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">06/29</span>
                <span class="info-icon">&gt;</span>
            </div>
        </div>

        <div class="call-item">
            <div class="call-info">
                <span class="name">진운</span>
                <div class="details">
                    <span class="call-type-icon">↗</span>
                    <span>통화 종료</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">06/28</span>
                <span class="info-icon">&gt;</span>
            </div>
        </div>

        <div class="call-item missed">
            <div class="call-info">
                <span class="name">진운</span>
                <div class="details">
                    <span class="call-type-icon">↗</span>
                    <span>부재중 통화</span>
                </div>
            </div>
            <div class="call-action">
                <span class="time">06/28</span>
                <span class="info-icon">&gt;</span>
            </div>
        </div>

        <div class="call-item missed">
                <div class="call-info">
                    <span class="name">도아린</span>
                    <div class="details">
                        <span class="call-type-icon">↗</span>
                        <span>부재중 통화</span>
                    </div>
                </div>
                <div class="call-action">
                    <span class="time">06/27</span>
                    <span class="info-icon">&gt;</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const callItems = document.querySelectorAll('.call-item');

            callItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    // 클릭 시 새로고침이나 이동을 방지하고, 여기에 상세 정보 표시 등의 로직을 추가할 수 있습니다.
                    e.preventDefault(); 
                    console.log('통화 상세 정보 로직을 여기에 추가하세요.');
                });
            });
        });
    </script>
    </body>
</html>
