<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메시지</title>
    <style>
        /* 📌 [CSS 시작] - 전체적인 레이아웃 및 스타일 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 10px 15px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            background-color: #ffffff;
            z-index: 10;
        }

        .header-title {
            font-size: 32px;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .message-container {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 0 10px 0;
        }

        .message-item {
            display: flex;
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .message-item:active {
            background-color: #f5f5f5;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #e0e0e0;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #555555;
            flex-shrink: 0;
            overflow: hidden; /* 영역을 벗어나는 이미지 컷팅 */
            position: relative;
        }

        /* 🛠️ 추가: avatar 내부의 이미지 스타일 */
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 찌그러지지 않고 영역을 채움 */
            display: block;
        }

        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .name {
            font-size: 17px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .time {
            font-size: 13px;
            color: #888888;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .last-message {
            font-size: 15px;
            color: #555555;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title" style="text-align: center;">메시지</div>
    </div>

    <div class="message-container">
        
        <div class="message-item" data-target="message.html" onclick="location.href='message_chat.html'">
            <div class="avatar">
                <img src="../img/chat profile.png" alt="프사">
            </div>
            <div class="content">
                <div class="top-line">
                    <span class="name">진운</span>
                    <span class="time">오후 5:21</span>
                </div>
                <div class="last-message">됐다, 안 다쳤으면 됐어.</div>
            </div>
        </div>

        <div class="message-item">
            <div class="avatar" style="background-color: #fff0f5;">아린</div>
            <div class="content">
                <div class="top-line">
                    <span class="name" style="font-weight: bold;">도아린</span>
                    <span class="time" style="color: #007aff; font-weight: 600;">오전 11:30</span>
                </div>
                <div class="last-message" style="color: #000000; font-weight: 500;">그래 알았어.</div>
            </div>
        </div>

        <div class="message-item">
            <div class="avatar" style="background-color: #f0fff0; color: #454545;">⚙️</div>
            <div class="content">
                <div class="top-line">
                    <span class="name">시스템 알림</span>
                    <span class="time">어제</span>
                </div>
                <div class="last-message">계정 보안 설정이 업데이트되었습니다.</div>
            </div>
        </div>

        <div class="message-item">
            <div class="avatar">A</div>
            <div class="content">
                <div class="top-line">
                    <span class="name">협회 직원</span>
                    <span class="time">10/20</span>
                </div>
                <div class="last-message">회의 시간 변경 안내입니다.</div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
    const messageItems = document.querySelectorAll('.message-item');

    messageItems.forEach(item => {
        item.addEventListener('click', () => {
        const targetFile = item.getAttribute('data-target');
        if (targetFile) {
            window.location.href = targetFile; // ✅ 클릭 시 해당 파일로 이동
        } else {
            console.error("data-target이 없습니다.");
        }
        });
    });
    });
    </script>

    </body>
</html>
