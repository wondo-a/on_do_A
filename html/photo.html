<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            background: #fff;
            font-family: sans-serif;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .gallery-item {
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 💡 핵심: 자동 정사각형 변환 */
        } 

        /* 전체보기 슬라이드 */
        #viewer {
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgb(255, 255, 255);
            display:none;
            z-index: 1000;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            text-shadow: 0px 0px 7px black;
        }
    </style>
</head>
<body>

    <div class="gallery-grid" id="grid">
        <div class="gallery-item"><img src="../img/1.png" onclick="openViewer(0)"></div>
        <div class="gallery-item"><img src="../img/2.png" onclick="openViewer(1)"></div>
        <div class="gallery-item"><img src="../img/3.png" onclick="openViewer(2)"></div>
        <div class="gallery-item"><img src="../img/4.png" onclick="openViewer(3)"></div>
        <div class="gallery-item"><img src="../img/5.png" onclick="openViewer(4)"></div>
        <div class="gallery-item"><img src="../img/6.png" onclick="openViewer(5)"></div>
        <div class="gallery-item"><img src="../img/7.png" onclick="openViewer(6)"></div>
        <div class="gallery-item"><img src="../img/8.png" onclick="openViewer(7)"></div>
        <div class="gallery-item"><img src="../img/9.png" onclick="openViewer(8)"></div>
        <div class="gallery-item"><img src="../img/10.png" onclick="openViewer(9)"></div>
        <div class="gallery-item"><img src="../img/11.png" onclick="openViewer(10)"></div>
        <div class="gallery-item"><img src="../img/12.png" onclick="openViewer(11)"></div>
        <div class="gallery-item"><img src="../img/13.png" onclick="openViewer(12)"></div>
        <div class="gallery-item"><img src="../img/14.png" onclick="openViewer(13)"></div>
        <div class="gallery-item"><img src="../img/15.png" onclick="openViewer(14)"></div>
        <div class="gallery-item"><img src="../img/16.png" onclick="openViewer(15)"></div>
    </div>

    <div id="viewer" onclick="closeViewer()">
        <span class="close-btn">×</span>
        <div id="slide-container" class="slide"></div>
    </div>

    <script>
        const images = [
            "../img/1.png", "../img/2.png", "../img/3.png",
            "../img/4.png", "../img/5.png", "../img/6.png",
            "../img/7.png", "../img/8.png", "../img/9.png",
            "../img/10.png", "../img/11.png", "../img/12.png",
            "../img/13.png", "../img/14.png", "../img/15.png",
            "../img/16.png"
        ];
        const viewer = document.getElementById('viewer');
        const slideContainer = document.getElementById('slide-container');

        function openViewer(index) {
            viewer.style.display = 'block';
            slideContainer.innerHTML = `<img src="${images[index]}">`;
            document.body.style.overflow = 'hidden';
        }
        function closeViewer() {
            viewer.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
