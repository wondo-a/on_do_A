<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메모</title>
    <style>
        /* 📌 [CSS 시작] - 전체적인 레이아웃 및 스타일 */
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh; /* 뷰포트 높이 꽉 채우기 */
            overflow: hidden; /* 전체 스크롤 방지 */
        }

        /* 1. 상단 메뉴바 */
        .header {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            background-color: #ffffff;
            z-index: 10;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            color: #007aff; 
            margin-bottom: 5px;
        }

        .header-title {
            font-size: 32px;
            font-weight: bold;
        }
        
        /* 2. 메모 목록 컨테이너 (스크롤 영역) */
        .note-container {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 0 10px 0;
        }

        /* 3. 개별 메모 항목 스타일 */
        .note-item {
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .note-item:active {
            background-color: #f5f5f5;
        }

        .note-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .note-details {
            font-size: 13px;
            color: #888888;
            display: flex;
            align-items: center;
        }

        .note-details .date {
            margin-right: 10px;
        }

        .note-content {
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* 📌 [CSS 끝] */
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top-row">
            <span>&lt; 폴더</span>
            <span>➕</span>
        </div>
        <div class="header-title">
            메모
        </div>
    </div>

    <div class="note-container">
        
        <div class="note-item" data-target="note1.html">
            <div class="note-title">긴급 회의 자료 준비</div>
            <div class="note-details">
                <span class="date">오늘</span>
                <span class="note-content">오후 2시까지 완료해야 하는 핵심 요약 정리본 초안.</span>
            </div>
        </div>
        
        <div class="note-item" data-target="note3.html">
            <div class="note-title">쇼핑 리스트</div>
            <div class="note-details">
                <span class="date">11/02</span>
                <span class="note-content">우유, 계란, 파스타면, 올리브 오일...</span>
            </div>
        </div>

        <div class="note-item" data-target="note4.html">
            <div class="note-title">제목 없음</div>
            <div class="note-details">
                <span class="date">10/25</span>
                <span class="note-content">처리팀 전달 메일 초안 작성.</span>
            </div>
        </div>

        <div class="note-item" data-target="note5.html">
            <div class="note-title">할 일 목록</div>
            <div class="note-details">
                <span class="date">10/20</span>
                <span class="note-content">은행 업무, 병원 예약 확인.</span>
            </div>
        </div>
        <div class="note-item" data-target="note6.html">
            <div class="note-title">출장 계획 (부산)</div>
            <div class="note-details">
                <span class="date">10/15</span>
                <span class="note-content">숙소 예약 및 KTX 시간표 정리.</span>
            </div>
        </div>
        
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 모든 메모 항목(note-item) 요소를 선택합니다.
            const noteItems = document.querySelectorAll('.note-item');

            noteItems.forEach(item => {
                item.addEventListener('click', () => {
                    // data-target 속성에서 이동할 파일명을 가져옵니다.
                    const targetFile = item.getAttribute('data-target');
                    
                    // 부모 창(index.html)에 정의된 loadAppContent 함수를 호출하여 화면을 전환합니다.
                    if (window.parent.loadAppContent && targetFile) {
                        window.parent.loadAppContent(targetFile); 
                    } else {
                        console.error("화면 전환 함수(loadAppContent)를 찾을 수 없거나 data-target이 누락되었습니다.");
                    }
                });
            });
            
            // 상단 새 메모 버튼(➕) 클릭 시 새 메모 작성 화면으로 이동하도록 구현 가능
            const newNoteButton = document.querySelector('.header-top-row span:last-child');
            if (newNoteButton) {
                newNoteButton.addEventListener('click', () => {
                    if (window.parent.loadAppContent) {
                        window.parent.loadAppContent('new_note.html'); // 새 메모 작성 페이지로 가정
                    }
                });
            }
        });
    </script>
    </body>
</html>
